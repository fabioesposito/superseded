{% extends "base.html" %}
{% block title %}Dashboard - Superseded{% endblock %}
{% block content %}
<div class="animate-fade-in" hx-ext="sse" hx-sse="connect:/pipeline/sse/dashboard{% if active_stage %}?stage={{ active_stage }}{% endif %}">
    <div class="flex items-center justify-between mb-8">
        <h1 class="text-3xl font-bold text-shell-50 tracking-tight">
            Dashboard
            {% if active_stage %}
            <span class="text-lg font-normal text-shell-500 ml-2">/ {{ active_stage }}</span>
            {% endif %}
        </h1>
        <a href="/issues/new" class="btn-primary text-white px-5 py-2.5 rounded-lg text-sm font-semibold inline-flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            New Issue
        </a>
    </div>

    {% include "_stage_counters.html" %}

    <div id="dashboard-table-wrap"
         hx-trigger="sse:table"
         hx-swap="outerHTML">
        {% include "_dashboard_table.html" %}
    </div>
</div>
{% endblock %}
